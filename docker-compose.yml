services:
  app:
    build: .
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      LICENSE_SIGNING_KEY: ${LICENSE_SIGNING_KEY:?LICENSE_SIGNING_KEY is required}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"

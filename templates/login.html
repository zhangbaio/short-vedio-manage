<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - 视频号短剧管理系统</title>
  <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    /* 背景动态粒子感 */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(0, 180, 200, 0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 60% 80%, rgba(80, 40, 160, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 48px 44px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
    }

    /* Logo 区域 */
    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .login-title {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .login-subtitle {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      text-align: center;
      margin-bottom: 36px;
    }

    /* 表单 */
    .form-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #ffffff;
      padding: 12px 16px;
      font-size: 14px;
      transition: all 0.25s ease;
      height: auto;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(124, 58, 237, 0.7);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
      color: #ffffff;
      outline: none;
    }

    /* 输入框图标 */
    .input-group-icon {
      position: relative;
    }

    .input-group-icon .form-control {
      padding-left: 44px;
    }

    .input-group-icon .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.35);
      z-index: 1;
      display: flex;
      align-items: center;
    }

    .input-group-icon .icon svg {
      width: 18px;
      height: 18px;
    }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: white;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.5);
      background: linear-gradient(135deg, #6d28d9, #0891b2);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* 错误提示 */
    .error-alert {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .error-alert svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      fill: #fca5a5;
    }

    /* 底部版权 */
    .login-footer {
      color: rgba(255, 255, 255, 0.2);
      font-size: 12px;
      text-align: center;
      margin-top: 28px;
    }

    /* 动画 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      animation: fadeInUp 0.5s ease forwards;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm3.5 1a.5.5 0 0 0 0 1h9a.5.5 0 0 0 0-1h-9zM10 10l5 3-5 3v-6z"/>
        </svg>
      </div>

      <h1 class="login-title">视频号短剧管理系统</h1>
      <p class="login-subtitle">请使用您的账号登录</p>

      <!-- 错误提示 -->
      {% if error %}
      <div class="error-alert">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <!-- 登录表单 -->
      <form method="post" action="{{ url_for('login') }}">
        <div class="mb-4">
          <label for="username" class="form-label">用户名</label>
          <div class="input-group-icon">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </span>
            <input type="text" class="form-control" id="username" name="username"
              placeholder="请输入用户名" autocomplete="username" required />
          </div>
        </div>

        <div class="mb-5">
          <label for="password" class="form-label">密码</label>
          <div class="input-group-icon">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </span>
            <input type="password" class="form-control" id="password" name="password"
              placeholder="请输入密码" autocomplete="current-password" required />
          </div>
        </div>

        <button type="submit" class="btn-login">登 录</button>
      </form>
    </div>

    <p class="login-footer">© 2025 视频号短剧管理系统</p>
  </div>
</body>
</html>

<!DOCTYPE html>

  <body>
    <nav class="navbar navbar-dark navbar-expand-lg bg-dark">

            <ul class="dropdown-menu dropdown-menu-end">

          </div>

    <div class="container py-4">

      </div>

      <div class="mb-3 d-flex gap-2">

            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"

      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">鎼滅储鍓у悕</label>

              <select id="companySelect" class="form-select">
                <option value="">鍏ㄩ儴</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">瀹℃牳閫氳繃</label>
              <select id="reviewSelect" class="form-select">
                <option value="">鍏ㄩ儴</option>
                <option value="鏄?>鏄?/option>
                <option value="鍚?>鍚?/option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">鏄惁涓婁紶</label>
              <select id="uploadedSelect" class="form-select">
                <option value="">鍏ㄩ儴</option>
                <option value="鏄?>鏄?/option>
                <option value="鍚?>鍚?/option>
              </select>
            </div>
            <div class="col-md-1">
              <label class="form-label">寮€濮嬫棩鏈?/label>

              <input type="date" id="dateTo" class="form-control" />
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="hideQuickAdd" checked />
                <label class="form-check-label" for="hideQuickAdd">涓嶆樉绀虹垎鍓?/label>
              </div>
            </div>
          </div>
          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary" id="queryBtn">鏌ヨ</button>
            <button class="btn btn-outline-secondary" id="resetBtn">閲嶇疆</button>
            <button class="btn btn-outline-success" id="exportBtn">瀵煎嚭Excel</button>
          </div>
        </div>
      </div>

      <div class="table-responsive mb-3">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th scope="col"><input type="checkbox" id="selectAll" /></th>
              <th scope="col">#</th>
              <th scope="col" data-sort="date" class="sortable-col">鏃ユ湡 <span class="sort-icon">鈬?/span></th>
              <th scope="col" data-sort="original_name" class="sortable-col">鍘熷墽鍚?<span class="sort-icon">鈬?/span></th>
              <th scope="col" data-sort="new_name" class="sortable-col">鏂板墽鍚?<span class="sort-icon">鈬?/span></th>
              <th scope="col" data-sort="episodes" class="sortable-col">闆嗘暟 <span class="sort-icon">鈬?/span></th>
              <th scope="col" data-sort="duration" class="sortable-col">鏃堕暱(鍒? <span class="sort-icon">鈬?/span></th>
              <th scope="col" data-sort="review_passed" class="sortable-col">瀹℃牳閫氳繃 <span class="sort-icon">鈬?/span></th>

              <th scope="col">澶囨敞涓€</th>
              <th scope="col">澶囨敞浜?/th>
              <th scope="col">澶囨敞涓?/th>
              <th scope="col">鎿嶄綔</th>
            </tr>
          </thead>
          <tbody id="dramaTableBody"></tbody>
        </table>

            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>
          <div class="btn-group" role="group">
            <button class="btn btn-outline-secondary" id="firstPageBtn">棣栭〉</button>
            <button class="btn btn-outline-secondary" id="prevPageBtn">涓婁竴椤?/button>
            <button class="btn btn-outline-secondary" id="nextPageBtn">涓嬩竴椤?/button>
            <button class="btn btn-outline-secondary" id="lastPageBtn">鏈〉</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="dramaModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="dramaModalLabel">鏂板鐭墽</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="dramaForm" class="row g-3">
              <input type="hidden" id="dramaId" />
              <div class="col-md-4">
                <label class="form-label">鏃ユ湡</label>
                <input type="date" class="form-control" id="dateInput" required />
                <div class="invalid-feedback">璇烽€夋嫨鏃ユ湡</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">鍘熷墽鍚?/label>
                <input
                  type="text"
                  class="form-control"
                  id="originalNameInput"
                  required
                  maxlength="100"
                />
                <div class="invalid-feedback">鍘熷墽鍚嶄笉鑳戒负绌?/div>
              </div>
              <div class="col-md-4">

                  type="number"
                  class="form-control"

                  min="1"
                  max="9999"
                  required
                />
                <div class="invalid-feedback">璇疯緭鍏?-9999涔嬮棿鐨勬鏁存暟</div>
              </div>
              <div class="col-md-3">
                <label class="form-label">鏃堕暱(鍒嗛挓)</label>
                <input
                  type="number"
                  class="form-control"
                  id="durationInput"
                  min="1"
                  max="99999"
                  required
                />
                <div class="invalid-feedback">璇疯緭鍏?-99999涔嬮棿鐨勬鏁存暟</div>

              </div>

                <label class="form-label">鎺ㄥ箍璇?/label>
                <input type="text" class="form-control" id="promoTextInput" maxlength="500" />
              </div>
              <div class="col-12">
                <label class="form-label">批量导入短剧名</label>
                <textarea class="form-control" id="remoteDramaTitlesInput" rows="6" placeholder="一行一个短剧名"></textarea>
              </div>

                <label class="form-label">本地工作目录</label>

              </div>
              <div class="col-md-3">
                <label class="form-label">失败策略</label>
                <select class="form-select" id="remoteOnProjectErrorSelect">
                  <option value="skip" selected>失败后继续</option>
                  <option value="stop">失败后停止</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">并行项目数</label>
                <input type="number" class="form-control" id="remoteParallelProjectsInput" min="1" max="4" value="1" />
              </div>
              <div class="col-12">
                <label class="form-label">执行步骤</label>
                <input type="text" class="form-control" id="remoteEnabledStepsInput" placeholder="download,rewrite_info,generate_poster,generate_materials,material_validate,upload_series,publish_materials" value="download,rewrite_info,generate_poster,generate_materials,material_validate,upload_series,publish_materials" />

                  </div>

                  </div>
                </div>
